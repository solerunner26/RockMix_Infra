name: Sync to Hugging Face Space

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Push to Hugging Face Space
        run: |
          git push --force https://ZeusAI79:${{ secrets.HF_TOKEN }}@huggingface.co/spaces/ZeusAI79/RockMix_Infra main
