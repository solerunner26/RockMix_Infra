name: Sync to Hugging Face Space

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Check Secret Presence
        env:
          HF_SYNC: ${{ secrets.HF_SYNC }}
        run: |
          if [ -z "$HF_SYNC" ]; then
            echo "::error::GitHub Secret 'HF_SYNC' is missing or empty! Please add it in your repository Settings > Secrets and variables > Actions > Repository secrets."
            exit 1
          else
            echo "GitHub Secret 'HF_SYNC' is successfully detected."
          fi

      - name: Push to Hugging Face Space
        env:
          HF_SYNC: ${{ secrets.HF_SYNC }}
        run: |
          git push --force https://token:$HF_SYNC@huggingface.co/spaces/ZeusAI79/RockMix main
